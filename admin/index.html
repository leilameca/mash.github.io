<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | MASH</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-brand">
      <img src="../assets/images/logo.png" alt="Logo de MASH" class="admin-logo">
      <p class="admin-kicker">Panel editorial</p>
      <h1>Administra colecciones e imagenes sin tocar codigo.</h1>
      <p class="admin-copy">Inicia sesion con la cuenta de GitHub autorizada para este repositorio. Desde aqui podras editar productos, subir imagenes y publicar cambios al catalogo.</p>
    </aside>
    <main class="admin-app">
      <div id="nc-root"></div>
    </main>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
